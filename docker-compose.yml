services:
  lpa-frontend:
    image: 311462405659.dkr.ecr.eu-west-1.amazonaws.com/sirius/sirius-lpa-frontend:latest
    build:
      dockerfile: docker/sirius-lpa-frontend/Dockerfile
    depends_on:
      - sirius-mock
    ports: ["8888:8080"]
    environment:
      HEALTHCHECK: /health-check
      INSECURE_COOKIES:
      PORT: 8080
      SIRIUS_URL: http://sirius-mock:8080
      SIRIUS_PUBLIC_URL: http://sirius-mock:8080
    healthcheck:
      test: ["CMD", "./healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  sirius-mock:
    image: wiremock/wiremock:3.13.2@sha256:fd27e46090916e85326229e5102ee169ae729059f3374549615bd20a35fee1f2
    ports: ["8563:8080"]
    volumes:
      - "./cypress/mocks:/home/wiremock/mappings"

  puppeteer:
    build: docker/puppeteer
    depends_on:
      - lpa-frontend
    environment:
      - LHCI_BUILD_CONTEXT__CURRENT_HASH=$GITHUB_SHA
      - LHCI_BUILD_CONTEXT__GITHUB_REPO_SLUG=ministryofjustice/opg-sirius-lpa-frontend
      - LHCI_GITHUB_APP_TOKEN

  go-lint:
    image: golangci/golangci-lint:v2.8.0@sha256:bebcfa63db7df53e417845ed61e4540519cf74fcba22793cdd174b3415a9e4e2
    working_dir: /go/src/app
    volumes:
      - ./:/go/src/app
      - ./.cache/golangci-lint/v1.53.3:/root/.cache
    command: golangci-lint run -v --timeout 5m --enable gosec --output.text.path stdout --output.sarif.path test-results/golangci-lint.sarif

  npm:
    build:
      context: docker/npm/
    working_dir: /home/node
    entrypoint: npm
    volumes:
      - ./:/home/node

  gosec:
    image: securego/gosec:latest@sha256:2cf71ea78210c496c65e3a987576a9c8317b68e20f2960520b3f6f8f9f539be5
    working_dir: /app
    volumes:
      - .:/app
    command: -exclude-dir=.gocache /app/...

  test-runner:
    build:
      context: docker/test-runner/
    command: gotestsum --junitfile test-results/unit-tests.xml -- ./... -coverprofile=test-results/test-coverage.txt
    working_dir: /go/src/app
    volumes:
      - ./:/go/src/app
      - ./.gocache:/go/pkg/mod

  pact:
    image: pactfoundation/pact-cli:1@sha256:cd239d7b1665263ac30d2d1b411238dff783ce2b547ddcec51ab460555371cca
    working_dir: /go/src/app
    volumes:
      - ./pacts:/go/src/app/pacts

  cypress:
    image: cypress/included:15.13.0@sha256:1048a3bac8a29e63159668a36d6dbbcf3a8a291d6f413c85edaf7e39bba9f3d9
    platform: "linux/amd64"
    command: run --browser edge
    entrypoint: cypress
    depends_on:
      - lpa-frontend
      - sirius-mock
    environment:
      - CYPRESS_BASE_URL=http://lpa-frontend:8080
      - CYPRESS_MOCK_SERVER_URI=http://sirius-mock:8080
      - CYPRESS_VIDEO=false
    working_dir: /e2e
    volumes:
      - ./:/e2e
